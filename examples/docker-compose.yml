# Code Review Assistant / Docker Compose 本地测试
#
# 用法:
#   docker compose -f examples/docker-compose.yml up --build
#
# 环境变量:
#   SEVERITY=high       # 门禁阈值: critical | high | medium | all
#   SCAN_SECRET=true    # 是否扫描密钥
#   SCAN_DEPS=true      # 是否扫描依赖漏洞
#   SCAN_QUALITY=true   # 是否执行代码质量检查

services:
  code-review:
    build:
      context: ..
      dockerfile: Dockerfile
    image: code-review-assistant:latest
    container_name: cra-local-review
    volumes:
      - ../:/workspace:ro
    environment:
      - SEVERITY=${SEVERITY:-high}
      - SCAN_SECRET=${SCAN_SECRET:-true}
      - SCAN_DEPS=${SCAN_DEPS:-true}
      - SCAN_QUALITY=${SCAN_QUALITY:-true}
    # 默认执行当前目录审查
    command: ["/workspace"]
    # 失败时返回非 0，方便本地测试门禁效果
    restart: "no"
