# Code Review Assistant - 定时审查配置
# 用法:
#   1. 编辑此文件配置审查时间和目标
#   2. 运行: ./scripts/scheduled-review.sh
#   3. 或添加 cron: crontab -e

# ==================== 基本配置 ====================
schedule:
  # 审查时间 (24小时制)
  # 示例: "09:00" 每天上午9点, "14:30" 每天下午2点半
  # 多时段: ["09:00", "17:00"] 每天两次
  time: "09:00"

  # 星期几执行 (0=周日, 1=周一, ... 6=周六)
  # 示例: [1,2,3,4,5] 工作日, [1,3,5] 周一三五
  days: [1, 2, 3, 4, 5]

  # 时区
  timezone: "Asia/Shanghai"

# ==================== 审查目标 ====================
targets:
  # Git 仓库路径 (相对于此配置文件, 或绝对路径)
  # 留空则使用当前目录
  repo_path: ""

  # 审查范围
  scope:
    # 上次审查以来的变更 (git diff)
    since_last_review: true

    # 或指定时间范围
    # since: "2024-01-01"
    # until: "2024-12-31"

    # 或指定分支对比
    # base_branch: "main"
    # compare_branch: "feature/xxx"

    # 指定文件/目录 (glob 模式)
    # include:
    #   - "src/**/*.java"
    #   - "app/**/*.ts"
    # exclude:
    #   - "**/test/**"
    #   - "**/*.spec.js"

# ==================== 审查选项 ====================
options:
  # 审查深度: "quick" | "standard" | "deep"
  depth: "standard"

  # 强制审查的语言/领域 (覆盖自动检测)
  # 可选: java | frontend | python | go | php | database | devops | mobile | bigdata | aiml | blockchain | security
  # force_language: ""

  # 输出格式: "markdown" | "json" | "html"
  output_format: "markdown"

  # 输出路径 (留空则打印到终端)
  # output_file: "./review-report.md"

  # 是否自动创建 Issue/PR Comment (需要配置 CI token)
  # auto_comment: false

# ==================== 通知配置 ====================
notifications:
  # 发现 Critical Issue 时通知
  on_critical_only: false

  # 通知方式 (未来扩展)
  # webhook: "https://hooks.slack.com/services/..."
  # email: "team@example.com"
  # dingtalk: "https://oapi.dingtalk.com/robot/send?access_token=..."
  # wecom: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=..."
